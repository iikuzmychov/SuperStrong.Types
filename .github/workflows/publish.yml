name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: read
      id-token: write

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve last published version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          response=$(curl -s "https://api.nuget.org/v3-flatcontainer/superstrong.types/index.json")
          last=$(printf '%s' "$response" | jq -r '.versions[-1] // empty' 2>/dev/null || true)

          echo "last=$last" >> "$GITHUB_OUTPUT"
          echo "Last published version: ${last:-<none>}"

      - name: Build solution
        run: dotnet build SuperStrong.slnx --configuration Release -p:LastPublishedVersion=${{ steps.version.outputs.last }}

      - name: Run tests
        run: dotnet test SuperStrong.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack SuperStrong.slnx --configuration Release --no-build --output ${{ github.workspace }}/artifacts -p:LastPublishedVersion=${{ steps.version.outputs.last }}

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
